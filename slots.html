<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Casino Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'casino-gold': '#ffd700',
                        'casino-border': '#c2952e',
                        'casino-panel': '#1a0533',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f071d; color: white; overflow-x: hidden; }
        .reel-container {
            height: 420px;
            background: linear-gradient(180deg, #2d0a4e 0%, #1a0533 100%);
            border: 6px solid #c2952e;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(194, 149, 46, 0.4);
        }
        .reel-column {
            position: relative;
            height: 100%;
            overflow: hidden;
            border-right: 2px solid rgba(255,255,255,0.1);
        }
        .reel-strip {
            position: absolute;
            width: 100%;
            transition: transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .symbol {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        .header-grad {
            background: linear-gradient(to right, #5a3300, #c2952e, #fceabb, #c2952e, #5a3300);
        }
        .neon-side {
            background: repeating-linear-gradient(0deg, #ff00ff 0px, #ff00ff 10px, #ff8800 11px, #ff8800 20px);
        }
        .spin-glow {
            box-shadow: 0 0 25px #4ade80, inset 0 0 15px rgba(255,255,255,0.5);
        }
        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4">

    <div id="action-modal" class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-casino-panel border-4 border-casino-border rounded-3xl p-8 max-w-md w-full text-center shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-black italic uppercase text-casino-gold mb-4">Bonus Feature</h2>
            <p id="modal-desc" class="text-lg mb-6">Are you sure you want to purchase a bonus round for 100,000?</p>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 bg-gray-600 py-3 rounded-xl font-bold uppercase">Cancel</button>
                <button id="modal-confirm" class="flex-1 bg-green-600 py-3 rounded-xl font-bold uppercase shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl w-full flex flex-col gap-2">
        
        <header class="header-grad p-1 rounded-t-2xl flex justify-between items-center border-b-2 border-white/30 shadow-lg">
            <div class="flex items-center gap-3 px-4">
                <button class="bg-[#2d1a00] p-2 rounded-lg border border-white/20">🏠</button>
                <div class="bg-black/50 px-4 py-1 rounded-full flex items-center gap-2 border border-yellow-400">
                    <span class="text-yellow-400 text-lg">💰</span>
                    <span id="balance-display" class="font-black text-white text-lg tracking-wide">20.670.000</span>
                    <button class="bg-green-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-black">+</button>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="openBuyModal()" class="bg-gradient-to-b from-green-400 to-green-700 px-8 py-1 rounded-lg font-black text-white italic border-2 border-white/40 uppercase shadow-md hover:scale-105 transition">Buy</button>
                <button onclick="openDealModal()" class="bg-gradient-to-b from-red-500 to-red-900 px-8 py-1 rounded-lg font-black text-white italic border-2 border-white/40 uppercase shadow-md hover:scale-105 transition">Deal</button>
            </div>

            <div class="flex items-center gap-4 px-4">
                <div class="bg-gradient-to-r from-blue-600 to-blue-900 px-10 py-1 rounded-full border-2 border-white/50 relative shadow-inner">
                    <span class="absolute -left-3 -top-1 text-2xl drop-shadow-md">⭐</span>
                    <span class="font-black text-white uppercase text-sm italic">Level 3</span>
                </div>
                <button class="bg-[#2d1a00] p-2 rounded-lg border border-white/20 text-white font-black">☰</button>
            </div>
        </header>

        <div class="relative reel-container rounded-xl flex overflow-hidden">
            <div class="w-8 neon-side opacity-60 border-r-2 border-casino-gold"></div>
            
            <main class="flex-1 grid grid-cols-5 gap-1 p-1">
                <div id="reel-0" class="reel-column"><div class="reel-strip"></div></div>
                <div id="reel-1" class="reel-column"><div class="reel-strip"></div></div>
                <div id="reel-2" class="reel-column"><div class="reel-strip"></div></div>
                <div id="reel-3" class="reel-column"><div class="reel-strip"></div></div>
                <div id="reel-4" class="reel-column"><div class="reel-strip"></div></div>
            </main>

            <div class="w-8 neon-side opacity-60 border-l-2 border-casino-gold"></div>
        </div>

        <footer class="bg-gradient-to-b from-[#1a1a1a] to-black p-4 rounded-b-2xl border-t-4 border-casino-border flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-6">
                <button class="w-14 h-14 rounded-full bg-gradient-to-b from-red-500 to-red-800 text-white font-black text-3xl border-2 border-white/50 shadow-lg italic">i</button>
                
                <div class="flex items-center bg-black border-2 border-blue-500 rounded-full p-1 gap-4 shadow-inner">
                    <button onclick="changeBet(-1000)" class="bg-blue-600 w-12 h-12 rounded-full font-black text-3xl shadow-lg border-2 border-blue-400 hover:bg-blue-500">-</button>
                    <div class="text-center min-w-[100px]">
                        <p class="text-[10px] text-blue-400 uppercase font-black tracking-widest">Total Bet</p>
                        <p id="bet-display" class="text-white font-black text-xl">10.000</p>
                    </div>
                    <button onclick="changeBet(1000)" class="bg-blue-600 w-12 h-12 rounded-full font-black text-3xl shadow-lg border-2 border-blue-400 hover:bg-blue-500">+</button>
                </div>
            </div>

            <div class="bg-black/80 border-2 border-blue-400 rounded-2xl px-16 py-3 text-center shadow-inner relative overflow-hidden group">
                <div class="absolute inset-0 bg-blue-500/10 animate-pulse"></div>
                <p class="text-[11px] text-blue-400 uppercase font-black tracking-widest relative z-10">Total Win</p>
                <p id="win-display" class="text-white font-black text-3xl drop-shadow-lg relative z-10">0</p>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="maxBet()" class="w-24 h-24 rounded-full bg-gradient-to-b from-purple-500 to-purple-800 border-4 border-purple-300 text-white font-black text-sm uppercase leading-tight shadow-xl hover:brightness-125 transition">Max<br>Bet</button>
                <button id="spin-btn" onclick="spin()" class="w-36 h-36 rounded-full bg-gradient-to-b from-green-300 to-green-700 border-4 border-green-200 spin-glow flex flex-col items-center justify-center transition-all active:scale-95 group">
                    <span class="text-white font-black text-4xl uppercase tracking-tighter drop-shadow-md">Spin</span>
                    <span class="text-[9px] text-white/80 font-black uppercase text-center mt-1 leading-none">Hold for<br>Autospin</span>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const symbols = ['💎', '🍒', '🎲', '🔔', '7️⃣', '🍉', '🍇', '🍋', '🐎', '🍫', '🎰', '🃏'];
        const REEL_COUNT = 5;
        let balance = 20670000;
        let currentBet = 10000;
        let isSpinning = false;

        function formatNum(n) { return n.toLocaleString().replace(/,/g, '.'); }

        // Initialize Reel Strips
        function init() {
            for (let i = 0; i < REEL_COUNT; i++) {
                const strip = document.querySelector(`#reel-${i} .reel-strip`);
                populateStrip(strip);
            }
            updateDisplays();
        }

        function populateStrip(strip) {
            strip.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const sym = document.createElement('div');
                sym.className = 'symbol';
                sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                strip.appendChild(sym);
            }
            strip.style.transform = `translateY(0px)`;
        }

        function updateDisplays() {
            document.getElementById('balance-display').innerText = formatNum(balance);
            document.getElementById('bet-display').innerText = formatNum(currentBet);
        }

        function changeBet(val) {
            if (isSpinning) return;
            currentBet = Math.max(1000, currentBet + val);
            updateDisplays();
        }

        function maxBet() {
            if (isSpinning) return;
            currentBet = 50000;
            updateDisplays();
        }

        // Functional Modal Logic
        const modal = document.getElementById('action-modal');
        function closeModal() { modal.classList.add('hidden'); }

        function openBuyModal() {
            if (isSpinning) return;
            document.getElementById('modal-title').innerText = "Buy Bonus";
            document.getElementById('modal-desc').innerText = `Purchase a high-win multiplier round for ${formatNum(currentBet * 10)}?`;
            document.getElementById('modal-confirm').onclick = () => {
                if(balance >= currentBet * 10) {
                    balance -= currentBet * 10;
                    closeModal();
                    triggerBigWinSpin();
                } else {
                    alert("Insufficient Balance");
                }
            };
            modal.classList.remove('hidden');
        }

        function openDealModal() {
            if (isSpinning) return;
            document.getElementById('modal-title').innerText = "Card Deal";
            document.getElementById('modal-desc').innerText = `Deal a winning card hand for ${formatNum(currentBet * 5)}?`;
            document.getElementById('modal-confirm').onclick = () => {
                if(balance >= currentBet * 5) {
                    balance -= currentBet * 5;
                    closeModal();
                    alert("Card Hand Dealt! Bonus Awarded: 50.000");
                    balance += 50000;
                    updateDisplays();
                } else {
                    alert("Insufficient Balance");
                }
            };
            modal.classList.remove('hidden');
        }

        async function spin() {
            if (isSpinning || balance < currentBet) return;
            isSpinning = true;
            balance -= currentBet;
            document.getElementById('win-display').innerText = "0";
            updateDisplays();

            const spinBtn = document.getElementById('spin-btn');
            spinBtn.classList.remove('spin-glow');
            
            const promises = [];
            for (let i = 0; i < REEL_COUNT; i++) {
                const strip = document.querySelector(`#reel-${i} .reel-strip`);
                const targetY = -(Math.floor(Math.random() * 10 + 20) * 140);
                
                promises.push(new Promise(res => {
                    setTimeout(() => {
                        strip.style.transform = `translateY(${targetY}px)`;
                        setTimeout(() => {
                            // Reset strip position visually after spin
                            strip.style.transition = 'none';
                            strip.style.transform = `translateY(0px)`;
                            populateStrip(strip);
                            setTimeout(() => strip.style.transition = 'transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95)', 50);
                            res();
                        }, 3100);
                    }, i * 150);
                }));
            }

            await Promise.all(promises);
            
            // Random Win Calculation
            if (Math.random() > 0.7) {
                const win = currentBet * (Math.floor(Math.random() * 5) + 2);
                document.getElementById('win-display').innerText = formatNum(win);
                balance += win;
            }

            isSpinning = false;
            spinBtn.classList.add('spin-glow');
            updateDisplays();
        }

        async function triggerBigWinSpin() {
            await spin(); // Reuse spin logic
            const bigWin = currentBet * 20;
            document.getElementById('win-display').innerText = formatNum(bigWin);
            balance += bigWin;
            updateDisplays();
        }

        init();
    </script>
</body>
</html>
